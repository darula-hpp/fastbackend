project:
  name: prisma-fastapi
  version: 1.0.0
  description: Prisma + FastAPI example for FastBackend

schema:
  format: prisma
  path: schema.prisma

adapter:
  name: fastapi
  customPath: app/custom

openapi:
  outputPath: .fastbackend/openapi.yaml
  title: prisma-fastapi
  version: 1.0.0
  servers:
    - url: http://localhost:8301
      description: Development server
  annotations:
    relationships: true

development:
  watch: true
  port: 8301
  hotReload: true
